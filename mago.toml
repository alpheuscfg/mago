#:schema https://mago.carthage.software/1.42.0/schema.json

version = "1"
php-version = "8.4"

[source]
workspace = "."
includes = ["./vendor"]

[formatter]

# Layout and width
print-width = 80
tab-width = 4
use-tabs = false
end-of-line = "lf"
single-quote = false
indent-heredoc = true
trailing-comma = true
remove-trailing-close-tag = true

[linter.rules]

# Clarity
no-empty = { enabled = true }

explicit-octal = { enabled = true }
instanceof-stringable = { enabled = true }
literal-named-argument = { enabled = false }
no-hash-emoji = { enabled = true }
no-isset = { enabled = true }
no-multi-assignments = { enabled = true }
no-nested-ternary = { enabled = false }
no-shorthand-ternary = { enabled = true }
no-variable-variable = { enabled = true }
readable-literal = { enabled = true }
str-contains = { enabled = true }
str-starts-with = { enabled = true }
tagged-fixme = { enabled = false }
tagged-todo = { enabled = false }

valid-docblock = { enabled = true }
missing-docs = { enabled = false }
no-negated-ternary = { enabled = true }
no-short-bool-cast = { enabled = true }

# Best Practices
no-inline = { enabled = false }

combine-consecutive-issets = { enabled = true }
loop-does-not-iterate = { enabled = true }
no-array-accumulation-in-loop = { enabled = true }
no-ini-set = { enabled = true }
no-literal-namespace-string = { enabled = true }
no-parameter-shadowing = { enabled = true }
no-side-effects-with-declarations = { enabled = true }
no-sprintf-concat = { enabled = false }
prefer-array-spread = { enabled = true }
prefer-explode-over-preg-split = { enabled = true }
prefer-first-class-callable = { enabled = false }
require-namespace = { enabled = true }
single-class-per-file = { enabled = true }

prefer-while-loop = { enabled = true }
prefer-arrow-function = { enabled = true }
prefer-early-continue = { enabled = true }
prefer-early-return = { enabled = true }
prefer-self-return-type = { enabled = true }
prefer-static-closure = { enabled = true }
sorted-integer-keys = { enabled = false }
use-compound-assignment = { enabled = true }
yoda-conditions = { enabled = true }

# Consistency
file-name = { enabled = true }
no-alternative-syntax = { enabled = true }
no-hash-comment = { enabled = true }

array-style = { enabled = true }
block-statement = { enabled = false }
braced-string-interpolation = { enabled = true }
no-alias-function = { enabled = true }
no-php-tag-terminator = { enabled = true }
no-trailing-space = { enabled = true }
string-style = { enabled = true }

ambiguous-function-call = { enabled = true }
class-name = { enabled = true, psr = true }
constant-name = { enabled = true }
enum-name = { enabled = true }
function-name = { enabled = true }
interface-name = { enabled = true, psr = true }
lowercase-keyword = { enabled = true }
lowercase-type-hint = { enabled = true }
method-name = { enabled = true }
no-fully-qualified-global-class-like = { enabled = true }
no-fully-qualified-global-constant = { enabled = true }
no-fully-qualified-global-function = { enabled = true }
property-name = { enabled = true }
trait-name = { enabled = true, psr = true }
variable-name = { enabled = true }

# Deprecation
deprecated-cast = { enabled = true }
deprecated-shell-execute-string = { enabled = true }
deprecated-switch-semicolon = { enabled = true }

explicit-nullable-param = { enabled = true }
no-underscore-class = { enabled = true }
no-void-reference-return = { enabled = false }
optional-param-order = { enabled = true }

# Maintainability
cyclomatic-complexity = { enabled = true }
excessive-parameter-list = { enabled = true }
kan-defect = { enabled = true }
too-many-enum-cases = { enabled = false }
too-many-methods = { enabled = false }
too-many-properties = { enabled = false }

excessive-nesting = { enabled = true }
halstead = { enabled = true }

no-goto = { enabled = true }

no-boolean-flag-parameter = { enabled = false }
no-else-clause = { enabled = false }

# Redundancy
inline-variable-return = { enabled = true }
no-iterator-to-array-in-foreach = { enabled = true }
no-redundant-literal-return = { enabled = true }
no-redundant-use = { enabled = true }
no-self-assignment = { enabled = true }

no-duplicate-match-arm = { enabled = true }
no-empty-comment = { enabled = true }
no-empty-loop = { enabled = true }
no-is-null = { enabled = true }

constant-condition = { enabled = true }
no-closing-tag = { enabled = true }
no-noop = { enabled = true }
no-null-property-init = { enabled = true }
no-protected-in-final = { enabled = true }
no-redundant-binary-string-prefix = { enabled = true }
no-redundant-block = { enabled = true }
no-redundant-continue = { enabled = true }
no-redundant-else = { enabled = true }
no-redundant-file = { enabled = true }
no-redundant-final = { enabled = true }
no-redundant-isset = { enabled = true }
no-redundant-label = { enabled = true }
no-redundant-math = { enabled = true }
no-redundant-method-override = { enabled = true }
no-redundant-nullsafe = { enabled = true }
no-redundant-parentheses = { enabled = true }
no-redundant-readonly = { enabled = true }
no-redundant-string-concat = { enabled = true }
no-redundant-write-visibility = { enabled = true }
no-redundant-yield-from = { enabled = true }

# Security
no-insecure-comparison = { enabled = true }
no-literal-password = { enabled = true }
sensitive-parameter = { enabled = true }
tainted-data-to-sink = { enabled = true }

disallowed-functions = { enabled = true }
no-short-opening-tag = { enabled = true }
require-preg-quote-delimiter = { enabled = true }
no-debug-symbols = { enabled = true }

# Safety
no-error-control-operator = { enabled = true }
no-eval = { enabled = true }
no-ffi = { enabled = false }
no-global = { enabled = true }
no-request-variable = { enabled = true }
no-shell-execute-string = { enabled = false }
no-unsafe-finally = { enabled = true }

# Correctness
assert-description = { enabled = true }
identity-comparison = { enabled = true }
ineffective-format-ignore-next = { enabled = true }
ineffective-format-ignore-region = { enabled = true }
no-assign-in-argument = { enabled = true }
no-assign-in-condition = { enabled = true }
no-dead-store = { enabled = true }
no-empty-catch-clause = { enabled = true }
no-redundant-variable = { enabled = true }
no-unused-closure-capture = { enabled = true }
no-unused-global = { enabled = true }
no-unused-static = { enabled = true }
strict-behavior = { enabled = true }
strict-types = { enabled = true }
suspicious-explode-arguments = { enabled = true }
switch-continue-to-break = { enabled = true }

invalid-open-tag = { enabled = true }

[analyzer]

# Feature flags
find-unused-expressions = true
find-unused-definitions = true
find-overly-wide-return-types = false
analyze-dead-code = true
memoize-properties = true
check-throws = true
check-missing-override = true
find-unused-parameters = true
strict-list-index-checks = true
strict-array-index-existence = true
allow-array-truthy-operand = false
no-boolean-literal-comparison = false
check-missing-type-hints = true
check-closure-missing-type-hints = true
check-arrow-function-missing-type-hints = true
allow-implicit-pipe-callable-types = false
register-super-globals = true
trust-existence-checks = false
check-property-initialization = true
check-use-statements = true
check-name-casing = true
enforce-class-finality = false
require-api-or-internal = false
check-experimental = true
allow-side-effects-in-conditions = true

# Plugins
disable-default-plugins = true
plugins = ["stdlib", "psr-11"]
